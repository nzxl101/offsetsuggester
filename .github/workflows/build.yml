name: build

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  pip install -r src/requirements.txt
                  pip install pyinstaller

            - name: Gather glfw DLLs
              shell: pwsh
              run: |
                  $src = python -c "import glfw,os; print(os.path.dirname(glfw.__file__))"
                  foreach ($f in @('glfw3.dll', 'msvcr120.dll')) {
                      $p = Join-Path $src $f
                      if (Test-Path $p) { Copy-Item $p . }
                  }

            - name: Build executable
              shell: pwsh
              run: |
                  $root = Get-Location
                  python -m PyInstaller --onefile --noconsole --noupx --name "OffsetSuggester" `
                      --copy-metadata slimgui `
                      --add-binary "$(Join-Path $root glfw3.dll);glfw" `
                      --add-binary "$(Join-Path $root msvcr120.dll);glfw" `
                      src/main.py

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: OffsetSuggester
                  path: dist/OffsetSuggester.exe

            - name: Release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/OffsetSuggester.exe
